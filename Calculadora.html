<html>

<head>

    <title>Calculadora</title>

</head>

<body>
    <h1>Calculadora</h1>
    <input id="Numero1" type="text" placeholder="Digite">
    <input id="Numero2" type="text" placeholder="Digite">
    <button id="Mais" onclick="somar()">Clique para Somar</button>
    <button id="Menos" onclick="subtrair()">Clique para Subtrair</button>
    <button id="Divisao" onclick="Divisao()">Clique para Dividir</button>
    <button id="Multiplicacao" onclick="Multiplicacao()">Clique para Multiplicar</button>
    <button id="BtnPorcentagem" onclick="Porcentagem()">Clique para Porcentagem</button>
    <p>
        <button id="testarSoma" onclick="testarSoma()">Testar Soma</button>
        <button id="testarSubtrair" onclick="testarSubtrair()">Testar Subtração</button>
        <button id="testarDivisao" onclick="testarDivisao()">Testar Divisão</button>
        <button id="testarMultiplicacao" onclick="testarMultiplicacao()">Testar Multiplicação</button>
        <button id="testarPorcentagem" onclick="testarPorcentagem()">Tertar Porcentagem</button>
        <button id="testarInput" onclick="testarInput()">Testar Input</button>
        <button id="testarBotao" onclick="testarBotao()">Testar Botão</button>
        <button id="testarTudo" onclick="testarTudo()">Testar Tudo</button>
    <div id="somar">
        <p>O resultado aparecerá aqui:
    </div>
    <div id="subtrair"></div>
    <div id="divisao"></div>
    <div id="multiplicacao"></div>
    <div id="resultadoPorcentagem"></div>
</body>

<script>
    <!-- JavaScript aqui -->

    function limparResultados() {
        document.getElementById("somar").innerHTML = "";
        document.getElementById("subtrair").innerHTML = "";
        document.getElementById("divisao").innerHTML = "";
        document.getElementById("multiplicacao").innerHTML = "";
        document.getElementById("resultadoPorcentagem").innerHTML = "";
    }
    //Testar tudo

    function calcSomar(n1, n2) { return n1 + n2; }
    function calcSubtrair(n1, n2) { return n1 - n2; }
    function calcDivisao(n1, n2) { return n2 !== 0 ? n1 / n2 : null; }
    function calcMultiplicacao(n1, n2) { return n1 * n2; }
    function calcPorcentagem(n1, n2) { return (n1 * n2) / 100; }

    function testarTudo() {
         limparResultados();
        document.getElementById("Numero1").value = "5";
        document.getElementById("Numero2").value = "5";

        let n1 = parseFloat(document.getElementById("Numero1").value);
        let n2 = parseFloat(document.getElementById("Numero2").value);

        document.getElementById("somar").innerHTML = "";

        function verificar(op, esperado, resultado) {
            if (resultado === esperado) {
                document.getElementById("somar").innerHTML += "✅ " + op + ": " + n1 + " e " + n2 + " = " + resultado + "<br>";
            } else {
                document.getElementById("somar").innerHTML += "❌ " + op + " | esperado: " + esperado + " | obtido: " + resultado +
                    "<br>";
            }
        }


        verificar("Soma", n1 + n2, calcSomar(n1, n2));
        verificar("Subtração", n1 - n2, calcSubtrair(n1, n2));
        verificar("Divisão", n2 !== 0 ? n1 / n2 : null, calcDivisao(n1, n2));
        verificar("Multiplicação", n1 * n2, calcMultiplicacao(n1, n2));
        verificar("Porcentagem",   (n1 * n2) / 100,      calcPorcentagem(n1, n2));
    }


    //teste input
    function testarInput() {
         limparResultados();
        const comp = document.getElementById("Numero2");
        if (comp) {
            document.getElementById("somar").innerHTML = "Input Encontrado";
        }
        else {
            document.getElementById("somar").innerHTML = "Input não Encontrado";

        }
    }
    //teste botão
    function testarBotao() {
         limparResultados();
        const comp = document.getElementById("Menos");
        if (comp) {
            document.getElementById("somar").innerHTML = "Botão Encontrado";
        }
        else {
            document.getElementById("somar").innerHTML = "Botão não Encontrado"
        }

    }

    function testarSoma() {
        document.getElementById("Numero1").value = "5"
        document.getElementById("Numero2").value = "5"

        let resultado = somar()

        if (resultado === 10) {
            document.getElementById("somar").innerHTML = "Teste ok: " + resultado;
        } else {
            document.getElementById("somar").innerHTML = "Erro no Teste: " + resultado;
        }
    }

    function somar() {
         limparResultados();
        let numero1 = parseFloat(document.getElementById("Numero1").value);
        let numero2 = parseFloat(document.getElementById("Numero2").value);
        if (isNaN(numero1) || isNaN(numero2)) {
            document.getElementById("somar").innerHTML = "Por favor, insira números válidos.";
            return null;
        } else {
            let resultado = numero1 + numero2;
            document.getElementById("somar").innerHTML = "O resultado da soma é: " + resultado;
            return resultado;
        }
    }

    function testarSubtrair() {
        document.getElementById("Numero1").value = "5"
        document.getElementById("Numero2").value = "5"
        let resultado = subtrair()

        if (resultado === 0) {
            document.getElementById("subtrair").innerHTML = "Teste ok: " + resultado;
        } else {
            document.getElementById("subtrair").innerHTML = "Erro no Teste: " + resultado;
        }
    }

    function subtrair() {
         limparResultados();
        let numero1 = parseFloat(document.getElementById("Numero1").value);
        let numero2 = parseFloat(document.getElementById("Numero2").value);
        if (isNaN(numero1) || isNaN(numero2)) {
            document.getElementById("subtrair").innerHTML = "Por favor, insira números válidos.";
            return null;
        } else {
            let resultado = numero1 - numero2;
            document.getElementById("subtrair").innerHTML = "O resultado da subtração é: " + resultado;
            return resultado;
        }
    }

    function testarDivisao() {
        document.getElementById("Numero1").value = "5"
        document.getElementById("Numero2").value = "5"
        let resultado = Divisao()

        if (resultado === 1) {
            document.getElementById("divisao").innerHTML = "Teste ok: " + resultado;
        } else {
            document.getElementById("divisao").innerHTML = "Erro no Teste: " + resultado;
        }
    }
    function Divisao() {
         limparResultados();
        let numero1 = parseFloat(document.getElementById("Numero1").value);
        let numero2 = parseFloat(document.getElementById("Numero2").value);
        if (isNaN(numero1) || isNaN(numero2)) {
            document.getElementById("divisao").innerHTML = "Por favor, insira números válidos.";
            return null;
        } else if (numero2 === 0) {
            document.getElementById("divisao").innerHTML = "Por favor, insira um número diferente de zero para a divisão.";
            return null;
        } else {
            let resultado = numero1 / numero2;
            document.getElementById("divisao").innerHTML = "O resultado da divisão é: " + resultado;
            return resultado;
        }
    }

    function testarMultiplicacao() {
        document.getElementById("Numero1").value = "5"
        document.getElementById("Numero2").value = "5"
        let resultado = Multiplicacao()

        if (resultado === 25) {
            document.getElementById("multiplicacao").innerHTML = "Teste ok: " + resultado;
        } else {
            document.getElementById("multiplicacao").innerHTML = "Erro no Teste: " + resultado;
        }
    }
    function Multiplicacao() {
         limparResultados();
        let numero1 = parseFloat(document.getElementById("Numero1").value);
        let numero2 = parseFloat(document.getElementById("Numero2").value);
        if (isNaN(numero1) || isNaN(numero2)) {
            document.getElementById("multiplicacao").innerHTML = "Por favor, insira números válidos.";
            return null;
        } else {
            let resultado = numero1 * numero2;
            document.getElementById("multiplicacao").innerHTML = "O resultado da multiplicação é: " + resultado;
            return resultado;
        }
    }
     function testarPorcentagem() {
        document.getElementById("Numero1").value = "200";
        document.getElementById("Numero2").value = "10";
        let resultado = Porcentagem();
      
        document.getElementById("resultadoPorcentagem").innerHTML = resultado === 20
            ? "Teste ok: " + resultado
            : "Erro no Teste: " + resultado;
    }
    function Porcentagem() {
         limparResultados();
        let numero1 = parseFloat(document.getElementById("Numero1").value);
        let numero2 = parseFloat(document.getElementById("Numero2").value);
        if (isNaN(numero1) || isNaN(numero2)) {
            document.getElementById("multiplicacao").innerHTML = "Por favor, insira números válidos.";
            return null;
        }
        let resultado = (numero1 * numero2) / 100; 
        document.getElementById("resultadoPorcentagem").innerHTML = "O resultado da porcentagem é: " + resultado; 
            numero2 + "% de " + numero1 + " = " + resultado;
        return resultado;
    }


</script>


</html>
